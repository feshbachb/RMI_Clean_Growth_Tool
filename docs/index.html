<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RMI Clean Growth Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #003B63;
  --energy: #45CFCC;
  --gray: #58595B;
  --light: #E6E7E8;
}
body {
  font-family: 'Source Sans Pro', sans-serif;
  color: var(--gray);
  background: #f5f6f7;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--blue);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 56px;
  gap: 16px;
}
.header img { height: 32px; }
.header h1 { font-size: 20px; font-weight: 700; white-space: nowrap; }
.tab-bar { display: flex; gap: 4px; margin-left: auto; }
.tab-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.65);
  font: 600 14px 'Source Sans Pro', sans-serif;
  padding: 16px 20px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
}
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: var(--energy); border-bottom-color: var(--energy); }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 300px;
  min-width: 300px;
  background: #fff;
  border-right: 1px solid var(--light);
  padding: 20px;
  overflow-y: auto;
}
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Sidebar controls */
.sidebar label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
.sidebar label:first-child { margin-top: 0; }
.sidebar select, .sidebar input[type="text"] {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--light);
  border-radius: 4px;
  font: 14px 'Source Sans Pro', sans-serif;
}
.sidebar select:focus, .sidebar input:focus { outline: none; border-color: var(--energy); }
.btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 16px;
  background: var(--energy);
  color: var(--blue);
  border: none;
  border-radius: 4px;
  font: 600 14px 'Source Sans Pro', sans-serif;
  cursor: pointer;
}
.btn:hover { background: #35b5b2; }
.btn:disabled { opacity: .5; cursor: default; }

/* Cards */
.cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.card {
  background: #fff;
  border-radius: 8px;
  padding: 16px 20px;
  flex: 1;
  min-width: 150px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: #999; }
.card-value { font-size: 26px; font-weight: 700; color: var(--blue); }
.card-sub { font-size: 13px; color: var(--gray); }

/* Tables */
.tbl-wrap {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  overflow-x: auto;
  margin-bottom: 20px;
}
.tbl-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl-wrap th {
  background: var(--blue);
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.tbl-wrap th:hover { background: #004d80; }
.tbl-wrap td { padding: 8px 12px; border-bottom: 1px solid var(--light); }
.tbl-wrap tr:hover td { background: #f0fafa; }

/* Chart wrapper */
.chart-wrap {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  padding: 12px;
  margin-bottom: 20px;
}

/* Section title */
.sec-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--blue);
  margin: 20px 0 10px;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--energy);
}

/* Panels */
.panel { display: none; }
.panel.active { display: flex; flex: 1; overflow: hidden; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: #999; }
.empty h2 { color: var(--blue); margin-bottom: 8px; }

/* Spinner */
.spinner-bg {
  position: fixed; inset: 0;
  background: rgba(255,255,255,.9);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}
.spinner-bg.visible { display: flex; }
.spin {
  width: 44px; height: 44px;
  border: 4px solid var(--light);
  border-top-color: var(--energy);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#spin-msg { font-size: 15px; color: var(--gray); font-weight: 500; }

/* Search dropdown */
.search-wrap { position: relative; }
.search-wrap input { width: 100%; }
.search-list {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  max-height: 240px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--light);
  border-top: none;
  z-index: 50;
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
}
.search-list.open { display: block; }
.search-item {
  padding: 7px 10px;
  font-size: 13px;
  cursor: pointer;
}
.search-item:hover { background: #e8f8f8; }

/* Footer */
.footer {
  background: #fff;
  border-top: 1px solid var(--light);
  padding: 10px 24px;
  font-size: 12px;
  color: #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Mobile */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid var(--light); }
  .header h1 { font-size: 16px; }
  .tab-btn { font-size: 12px; padding: 12px 10px; }
  .cards { flex-direction: column; }
  .content { padding: 12px; }
  .sidebar select, .sidebar input { font-size: 16px !important; }
}
</style>
</head>
<body>

<div class="spinner-bg" id="spinner">
  <div class="spin"></div>
  <div id="spin-msg">Loading...</div>
</div>

<div class="header">
  <img src="rmi_logo_white.svg" alt="RMI">
  <h1>Clean Growth Tool</h1>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="national">National</button>
    <button class="tab-btn" data-tab="regional">Regional</button>
    <button class="tab-btn" data-tab="industry">Industry Space</button>
  </div>
</div>

<!-- National -->
<div class="panel active" id="p-national">
  <div class="sidebar">
    <label>Geography Level</label>
    <select id="nat-level">
      <option value="county">County</option>
      <option value="state">State</option>
      <option value="cbsa">Metro Area (CBSA)</option>
      <option value="csa">Combined Statistical Area</option>
      <option value="cz">Commuting Zone</option>
    </select>
    <div id="nat-state-wrap" style="display:none">
      <label>Filter by State</label>
      <select id="nat-state"><option value="">All States</option></select>
    </div>
    <label>Mode</label>
    <select id="nat-mode">
      <option value="industry">Industry Metrics</option>
      <option value="geography">Geography Metrics</option>
    </select>
    <div id="nat-ind-wrap">
      <label>Industry</label>
      <div class="search-wrap" id="nat-ind-search"></div>
    </div>
    <div id="nat-ind-metric-wrap">
      <label>Metric</label>
      <select id="nat-metric">
        <option value="industry_feasibility" selected>Industry Feasibility</option>
        <option value="industry_feasibility_percentile_score">Feasibility Percentile</option>
        <option value="industry_present">Industry Presence</option>
        <option value="location_quotient">Location Quotient</option>
        <option value="industry_comparative_advantage">Comparative Advantage</option>
        <option value="strategic_gain">Strategic Gain</option>
        <option value="strategic_gain_percentile_score">Strategic Gain Percentile</option>
        <option value="strategic_gain_possible">Strategic Gain Possible</option>
        <option value="industry_employment_share">Employment Share</option>
      </select>
    </div>
    <div id="nat-geo-metric-wrap" style="display:none">
      <label>Metric</label>
      <select id="nat-geo-metric">
        <option value="economic_complexity_index">Economic Complexity Index</option>
        <option value="economic_complexity_percentile_score">ECI Percentile</option>
        <option value="industrial_diversity">Industrial Diversity</option>
        <option value="strategic_index">Strategic Index</option>
        <option value="strategic_index_percentile">Strategic Index Percentile</option>
      </select>
    </div>
    <button class="btn" id="nat-go">Load Data</button>
  </div>
  <div class="content" id="nat-content">
    <div class="empty"><h2>National Comparison</h2><p>Select filters and click Load Data.</p></div>
  </div>
</div>

<!-- Regional -->
<div class="panel" id="p-regional">
  <div class="sidebar">
    <label>Geography Level</label>
    <select id="reg-level">
      <option value="county">County</option>
      <option value="state">State</option>
      <option value="cbsa">Metro Area (CBSA)</option>
      <option value="csa">Combined Statistical Area</option>
      <option value="cz">Commuting Zone</option>
    </select>
    <label>Search Geography</label>
    <div class="search-wrap" id="reg-geo-search"></div>
  </div>
  <div class="content" id="reg-content">
    <div class="empty"><h2>Select a Geography</h2><p>Choose a level and search for a region to view its profile.</p></div>
  </div>
</div>

<!-- Industry Space -->
<div class="panel" id="p-industry">
  <div class="sidebar">
    <label>Geography Level</label>
    <select id="is-level">
      <option value="county">County</option>
      <option value="state">State</option>
      <option value="cbsa">Metro Area (CBSA)</option>
      <option value="csa">Combined Statistical Area</option>
      <option value="cz">Commuting Zone</option>
    </select>
    <label>Highlight Geography (optional)</label>
    <div class="search-wrap" id="is-geo-search"></div>
    <button class="btn" id="is-go">Load Industry Data</button>
  </div>
  <div class="content" id="is-content">
    <div class="empty"><h2>Industry Space</h2><p>Select a geography level and click Load Industry Data.</p></div>
  </div>
</div>

<div class="footer">
  <span>Source: <a href="https://rmi.org" target="_blank">RMI</a> Clean Growth Tool</span>
  <img src="rmi_logo_dark.svg" alt="RMI" height="24">
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════
const BASE = (() => {
  const s = document.baseURI || location.href;
  return s.substring(0, s.lastIndexOf('/') + 1);
})();

const CACHE = new Map();
const LEVELS = { county: 1, state: 2, cbsa: 3, csa: 4, cz: 5 };
const LEVEL_NAME = { county:'County', state:'State', cbsa:'Metro Area', csa:'CSA', cz:'Commuting Zone' };

let metaGeo = null, crosswalk = null, industryTitles = null, metaIndustry = null;
let stateFipsToAbbr = null, countyToParent = null, stateList = null;

// ═══════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════
function show(id) { document.getElementById(id).classList.add('visible'); }
function hide(id) { document.getElementById(id).classList.remove('visible'); }
function spin(msg) { document.getElementById('spin-msg').textContent = msg || 'Loading...'; show('spinner'); }
function unspin() { hide('spinner'); }

function fmt(v, d) { return v == null || isNaN(v) ? '\u2014' : Number(v).toFixed(d == null ? 2 : d); }
function fmtPct(v) { return v == null ? '\u2014' : fmt(v, 1) + '%'; }
function fmtInt(v) { return v == null ? '\u2014' : Math.round(v).toLocaleString(); }

function padGeoid(id, level) {
  if (level === 'county') return String(id).padStart(5, '0');
  if (level === 'state') return String(id).padStart(2, '0');
  return String(id);
}

async function fetchCSV(path) {
  if (CACHE.has(path)) return CACHE.get(path);
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error('Failed: ' + path + ' (' + r.status + ')');
  const t = await r.text();
  const d = Papa.parse(t.trim(), { header: true, skipEmptyLines: true, dynamicTyping: true }).data;
  CACHE.set(path, d);
  return d;
}

async function fetchGz(path) {
  if (CACHE.has(path)) return CACHE.get(path);
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error('Failed: ' + path + ' (' + r.status + ')');
  const buf = await r.arrayBuffer();
  const t = pako.inflate(new Uint8Array(buf), { to: 'string' });
  const d = Papa.parse(t.trim(), { header: true, skipEmptyLines: true, dynamicTyping: true }).data;
  CACHE.set(path, d);
  return d;
}

// ═══════════════════════════════════════
//  SEARCH SELECT WIDGET
// ═══════════════════════════════════════
function searchSelect(container, items, placeholder, onPick) {
  container.innerHTML = '';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = placeholder || 'Type to search...';
  const list = document.createElement('div');
  list.className = 'search-list';
  container.appendChild(inp);
  container.appendChild(list);

  let selected = null;

  function render(q) {
    q = (q || '').toLowerCase();
    const f = q ? items.filter(i => i.label.toLowerCase().includes(q)).slice(0, 150) : items.slice(0, 150);
    list.innerHTML = f.map(i => '<div class="search-item" data-v="' + i.value + '">' + escHtml(i.label) + '</div>').join('');
    list.classList.add('open');
    list.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        selected = el.dataset.v;
        inp.value = el.textContent;
        list.classList.remove('open');
        if (onPick) onPick(selected);
      });
    });
  }

  inp.addEventListener('focus', () => render(inp.value));
  inp.addEventListener('input', () => render(inp.value));
  inp.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 150));

  return {
    val: () => selected,
    set: (v, label) => { selected = v; inp.value = label || ''; },
    clear: () => { selected = null; inp.value = ''; }
  };
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════
//  SORTABLE TABLE
// ═══════════════════════════════════════
function makeTable(el, cols, rows, sortKey, sortDir) {
  if (!rows.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">No data.</div>'; return; }
  let sk = sortKey || cols[0].key, sd = sortDir || 'desc';

  function draw() {
    const sorted = [...rows].sort((a, b) => {
      let av = a[sk], bv = b[sk];
      if (av == null) return 1; if (bv == null) return -1;
      if (typeof av === 'string') return sd === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sd === 'asc' ? av - bv : bv - av;
    });
    let h = '<div class="tbl-wrap"><table><thead><tr>';
    cols.forEach(c => { h += '<th data-k="' + c.key + '">' + c.label + '</th>'; });
    h += '</tr></thead><tbody>';
    sorted.slice(0, 500).forEach(r => {
      h += '<tr>';
      cols.forEach(c => {
        const v = r[c.key];
        h += '<td style="text-align:' + (c.align || 'left') + '">' + (c.fmt ? c.fmt(v) : (v == null ? '\u2014' : v)) + '</td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    if (rows.length > 500) h += '<div style="font-size:12px;color:#999;margin-top:-16px;margin-bottom:16px;">Showing 500 of ' + rows.length + ' rows</div>';
    el.innerHTML = h;
    el.querySelectorAll('th').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.k;
        if (sk === k) sd = sd === 'asc' ? 'desc' : 'asc';
        else { sk = k; sd = 'desc'; }
        draw();
      });
    });
  }
  draw();
}

// ═══════════════════════════════════════
//  METADATA
// ═══════════════════════════════════════
async function loadMeta() {
  metaGeo = await fetchCSV('meta/geography_specific.csv');
  const indRows = await fetchCSV('meta/industry_titles.csv');
  industryTitles = new Map();
  indRows.forEach(r => industryTitles.set(String(r.industry_code), r.industry_description));
  crosswalk = await fetchCSV('meta/crosswalk.csv');
  buildMaps();
}

function buildMaps() {
  stateFipsToAbbr = new Map();
  countyToParent = new Map();
  const ss = new Map();
  crosswalk.forEach(r => {
    const sf = String(r.state_fips).padStart(2, '0');
    if (r.state_abbreviation) {
      stateFipsToAbbr.set(sf, r.state_abbreviation);
      if (!ss.has(sf)) ss.set(sf, { fips: sf, abbr: r.state_abbreviation, name: r.state_name || r.state_abbreviation });
    }
    const cid = String(r.county_geoid).padStart(5, '0');
    countyToParent.set(cid, {
      cbsa: r.county_in_cbsa === true || r.county_in_cbsa === 'True' ? { geoid: String(r.cbsa_geoid), name: r.cbsa_name } : null,
      csa: r.county_in_csa === true || r.county_in_csa === 'True' ? { geoid: String(r.csa_geoid), name: r.csa_name } : null,
      cz: { geoid: String(r.commuting_zone_geoid), name: r.commuting_zone_name },
      state_fips: sf,
      state_abbr: r.state_abbreviation,
      county_name: r.county_name
    });
  });
  stateList = Array.from(ss.values()).sort((a, b) => a.name.localeCompare(b.name));
}

function countyName(fips) {
  const p = countyToParent ? countyToParent.get(fips) : null;
  return p ? (p.county_name || fips) + ', ' + (p.state_abbr || '') : fips;
}

function geosByLevel(level) {
  return metaGeo.filter(r => r.geo_aggregation_level === LEVELS[level]);
}

function geoItems(level) {
  return geosByLevel(level).map(g => {
    let label = g.name;
    if (level === 'county') label = countyName(String(g.geoid).padStart(5, '0'));
    return { value: String(g.geoid), label };
  }).sort((a, b) => a.label.localeCompare(b.label));
}

// ═══════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('p-' + btn.dataset.tab).classList.add('active');
  });
});

// ═══════════════════════════════════════
//  NATIONAL VIEW
// ═══════════════════════════════════════
let natIndWidget = null;

function initNatControls() {
  // Industry search
  const items = [];
  industryTitles.forEach((desc, code) => items.push({ value: code, label: code + ' - ' + desc }));
  items.sort((a, b) => a.label.localeCompare(b.label));
  natIndWidget = searchSelect(document.getElementById('nat-ind-search'), items, 'Search industry...');
  natIndWidget.set('335910', '335910 - ' + (industryTitles.get('335910') || 'Battery Manufacturing'));

  // State filter
  if (stateList) {
    const sel = document.getElementById('nat-state');
    stateList.forEach(s => {
      const o = document.createElement('option');
      o.value = s.fips; o.textContent = s.name;
      sel.appendChild(o);
    });
  }

  // Mode toggle
  document.getElementById('nat-mode').addEventListener('change', () => {
    const m = document.getElementById('nat-mode').value;
    document.getElementById('nat-ind-wrap').style.display = m === 'industry' ? '' : 'none';
    document.getElementById('nat-ind-metric-wrap').style.display = m === 'industry' ? '' : 'none';
    document.getElementById('nat-geo-metric-wrap').style.display = m === 'geography' ? '' : 'none';
  });

  // Level toggle for state filter
  document.getElementById('nat-level').addEventListener('change', () => {
    document.getElementById('nat-state-wrap').style.display = document.getElementById('nat-level').value === 'county' ? '' : 'none';
  });

  document.getElementById('nat-go').addEventListener('click', loadNational);
}

async function loadNational() {
  spin('Loading national data...');
  const out = document.getElementById('nat-content');
  try {
    const level = document.getElementById('nat-level').value;
    const mode = document.getElementById('nat-mode').value;
    out.innerHTML = '';

    if (mode === 'geography') {
      const mk = document.getElementById('nat-geo-metric').value;
      const ml = document.getElementById('nat-geo-metric').selectedOptions[0].text;
      let geos = geosByLevel(level);

      // State filter
      if (level === 'county' && document.getElementById('nat-state').value) {
        const sf = document.getElementById('nat-state').value;
        geos = geos.filter(g => String(g.geoid).padStart(5, '0').startsWith(sf));
      }

      // Add display names
      geos = geos.map(g => ({
        ...g,
        display: level === 'county' ? countyName(String(g.geoid).padStart(5, '0')) : g.name
      }));

      renderNatResults(out, geos, mk, ml, level, null);
    } else {
      const indCode = natIndWidget ? natIndWidget.val() : null;
      if (!indCode) { out.innerHTML = '<div class="empty"><p>Select an industry first.</p></div>'; unspin(); return; }

      let data = await fetchGz('by_industry/' + level + '/' + indCode + '.csv.gz');
      const mk = document.getElementById('nat-metric').value;
      const ml = document.getElementById('nat-metric').selectedOptions[0].text;
      const indDesc = industryTitles.get(indCode) || indCode;

      // State filter
      if (level === 'county' && document.getElementById('nat-state').value) {
        const sf = document.getElementById('nat-state').value;
        data = data.filter(r => String(r.geoid).padStart(5, '0').startsWith(sf));
      }

      // Join names
      const geoMap = new Map();
      metaGeo.filter(g => g.geo_aggregation_level === LEVELS[level]).forEach(g => geoMap.set(String(g.geoid), g.name));
      data = data.map(r => ({
        ...r,
        display: level === 'county' ? countyName(String(r.geoid).padStart(5, '0')) : (geoMap.get(String(r.geoid)) || String(r.geoid))
      }));

      const title = document.createElement('h2');
      title.style.cssText = 'color:var(--blue);margin-bottom:16px;';
      title.textContent = indCode + ' \u2014 ' + indDesc;
      out.appendChild(title);

      renderNatResults(out, data, mk, ml, level, indCode);
    }
  } catch (e) {
    console.error(e);
    out.innerHTML = '<div class="empty"><h2>Error</h2><p>' + escHtml(e.message) + '</p></div>';
  }
  unspin();
}

function renderNatResults(out, rows, mk, ml, level, indCode) {
  // Map
  const mapDiv = document.createElement('div');
  mapDiv.className = 'chart-wrap';
  const mapEl = document.createElement('div');
  mapDiv.appendChild(mapEl);
  out.appendChild(mapDiv);

  if (level === 'state') {
    renderStateMap(mapEl, rows, mk, ml);
  } else {
    renderPlotlyCountyMap(mapEl, rows, mk, ml, level);
  }

  // Summary cards
  const vals = rows.map(r => r[mk]).filter(v => v != null && !isNaN(v));
  if (vals.length) {
    const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
    const sorted = [...vals].sort((a, b) => a - b);
    const cd = document.createElement('div');
    cd.className = 'cards';
    cd.innerHTML =
      '<div class="card"><div class="card-label">Count</div><div class="card-value">' + fmtInt(vals.length) + '</div></div>' +
      '<div class="card"><div class="card-label">Average</div><div class="card-value">' + fmt(avg) + '</div></div>' +
      '<div class="card"><div class="card-label">Median</div><div class="card-value">' + fmt(sorted[Math.floor(sorted.length / 2)]) + '</div></div>' +
      '<div class="card"><div class="card-label">Range</div><div class="card-value">' + fmt(sorted[0]) + ' \u2013 ' + fmt(sorted[sorted.length - 1]) + '</div></div>';
    out.appendChild(cd);
  }

  // Table
  const tt = document.createElement('div');
  tt.className = 'sec-title';
  tt.textContent = ml + ' by ' + LEVEL_NAME[level];
  out.appendChild(tt);
  const tw = document.createElement('div');
  out.appendChild(tw);
  makeTable(tw, [
    { key: 'display', label: 'Geography' },
    { key: mk, label: ml, align: 'right', fmt: v => fmt(v, 3) }
  ], rows, mk, 'desc');

  // Histogram
  if (vals.length > 1) {
    const ht = document.createElement('div');
    ht.className = 'sec-title';
    ht.textContent = ml + ' Distribution';
    out.appendChild(ht);
    const hw = document.createElement('div');
    hw.className = 'chart-wrap';
    const he = document.createElement('div');
    hw.appendChild(he);
    out.appendChild(hw);
    Plotly.newPlot(he, [{ x: vals, type: 'histogram', marker: { color: '#1f78b4' }, nbinsx: 40 }], {
      xaxis: { title: ml }, yaxis: { title: 'Count' },
      margin: { t: 20, r: 20, b: 50, l: 50 }, height: 300,
      font: { family: 'Source Sans Pro, sans-serif' }
    }, { responsive: true });
  }
}

function renderStateMap(el, geos, mk, ml) {
  // Use Plotly built-in US state map (no GeoJSON needed)
  const abbrMap = new Map();
  geos.forEach(g => {
    const fips = String(g.geoid).padStart(2, '0');
    const abbr = stateFipsToAbbr ? stateFipsToAbbr.get(fips) : null;
    if (abbr) abbrMap.set(fips, abbr);
  });

  const locs = [], vals = [], texts = [];
  geos.forEach(g => {
    const fips = String(g.geoid).padStart(2, '0');
    const abbr = abbrMap.get(fips);
    if (!abbr || g[mk] == null) return;
    locs.push(abbr);
    vals.push(g[mk]);
    texts.push((g.display || g.name || fips) + '<br>' + ml + ': ' + fmt(g[mk], 3));
  });

  Plotly.newPlot(el, [{
    type: 'choropleth',
    locationmode: 'USA-states',
    locations: locs,
    z: vals,
    text: texts,
    hoverinfo: 'text',
    colorscale: 'YlGnBu',
    colorbar: { title: ml, thickness: 15 }
  }], {
    geo: { scope: 'usa', projection: { type: 'albers usa' }, showlakes: false },
    margin: { t: 10, r: 10, b: 10, l: 10 },
    height: 500,
    font: { family: 'Source Sans Pro, sans-serif' }
  }, { responsive: true });
}

function renderPlotlyCountyMap(el, rows, mk, ml, level) {
  // For county level, use Plotly choropleth with GeoJSON
  // For CBSA/CSA/CZ, map parent values onto counties
  const dataMap = new Map();

  if (level === 'county') {
    rows.forEach(r => {
      const fips = String(r.geoid).padStart(5, '0');
      if (r[mk] != null) dataMap.set(fips, { val: r[mk], display: r.display || fips });
    });
  } else {
    // Map parent region values to counties
    const parentKey = level === 'cbsa' ? 'cbsa' : level === 'csa' ? 'csa' : 'cz';
    const parentVals = new Map();
    rows.forEach(r => parentVals.set(String(r.geoid), { val: r[mk], display: r.display || String(r.geoid) }));

    if (countyToParent) {
      countyToParent.forEach((parent, countyFips) => {
        const pi = parent[parentKey];
        if (!pi || !pi.geoid) return;
        const pv = parentVals.get(String(pi.geoid));
        if (pv && pv.val != null) {
          dataMap.set(countyFips, { val: pv.val, display: countyName(countyFips) + ' (' + (pi.name || '') + ')' });
        }
      });
    }
  }

  if (dataMap.size === 0) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:#666;">No map data available.</div>';
    return;
  }

  // Filter to continental US (state FIPS <= 56)
  const locs = [], vals = [], texts = [];
  dataMap.forEach((d, fips) => {
    const sf = parseInt(fips.substring(0, 2));
    if (sf > 56) return;
    locs.push(fips);
    vals.push(d.val);
    texts.push(d.display + '<br>' + ml + ': ' + fmt(d.val, 3));
  });

  Plotly.newPlot(el, [{
    type: 'choropleth',
    geojson: BASE + 'us-counties-2023.json',
    featureidkey: 'id',
    locations: locs,
    z: vals,
    text: texts,
    hoverinfo: 'text',
    colorscale: 'YlGnBu',
    colorbar: { title: ml, thickness: 15 },
    marker: { line: { width: 0.2, color: '#fff' } }
  }], {
    geo: { scope: 'usa', projection: { type: 'albers usa' }, showlakes: false },
    margin: { t: 10, r: 10, b: 10, l: 10 },
    height: 550,
    font: { family: 'Source Sans Pro, sans-serif' }
  }, { responsive: true });
}

// ═══════════════════════════════════════
//  REGIONAL VIEW
// ═══════════════════════════════════════
let regGeoWidget = null;

function initRegControls() {
  function populate() {
    const level = document.getElementById('reg-level').value;
    regGeoWidget = searchSelect(
      document.getElementById('reg-geo-search'),
      geoItems(level),
      'Search ' + LEVEL_NAME[level] + '...',
      (val) => loadRegional(level, val)
    );
  }
  populate();
  document.getElementById('reg-level').addEventListener('change', () => {
    populate();
    document.getElementById('reg-content').innerHTML = '<div class="empty"><h2>Select a Geography</h2><p>Choose a level and search for a region.</p></div>';
  });
}

async function loadRegional(level, geoid) {
  spin('Loading regional data...');
  const out = document.getElementById('reg-content');
  try {
    const data = await fetchGz('by_geography/' + level + '/' + padGeoid(geoid, level) + '.csv.gz');
    const geoRec = metaGeo.find(g => g.geo_aggregation_level === LEVELS[level] && String(g.geoid) === String(geoid));

    out.innerHTML = '';

    // Title
    const title = document.createElement('h2');
    title.style.cssText = 'color:var(--blue);margin-bottom:16px;';
    title.textContent = level === 'county' ? countyName(padGeoid(geoid, level)) : (geoRec ? geoRec.name : geoid);
    out.appendChild(title);

    // Summary cards
    if (geoRec) {
      const cd = document.createElement('div');
      cd.className = 'cards';
      cd.innerHTML =
        '<div class="card"><div class="card-label">Economic Complexity</div><div class="card-value">' + fmt(geoRec.economic_complexity_index) + '</div><div class="card-sub">' + fmtPct(geoRec.economic_complexity_percentile_score) + ' percentile</div></div>' +
        '<div class="card"><div class="card-label">Industrial Diversity</div><div class="card-value">' + fmtInt(geoRec.industrial_diversity) + '</div></div>' +
        '<div class="card"><div class="card-label">Strategic Index</div><div class="card-value">' + fmt(geoRec.strategic_index) + '</div><div class="card-sub">' + fmtPct(geoRec.strategic_index_percentile) + ' percentile</div></div>';
      out.appendChild(cd);
    }

    // Enrich data with industry names
    const enriched = data.map(r => ({
      ...r,
      industry_description: industryTitles.get(String(r.industry_code)) || String(r.industry_code)
    }));

    // Current Strengths
    const strengths = enriched.filter(r => r.industry_comparative_advantage === 1).sort((a, b) => (b.location_quotient || 0) - (a.location_quotient || 0));
    const h1 = document.createElement('div'); h1.className = 'sec-title'; h1.textContent = 'Current Strengths (' + strengths.length + ')'; out.appendChild(h1);
    const t1 = document.createElement('div'); out.appendChild(t1);
    makeTable(t1, [
      { key: 'industry_description', label: 'Industry' },
      { key: 'industry_code', label: 'Code', align: 'center' },
      { key: 'location_quotient', label: 'LQ', align: 'right', fmt: v => fmt(v, 2) },
      { key: 'industry_employment_share', label: 'Emp Share', align: 'right', fmt: v => v != null ? (v * 100).toFixed(3) + '%' : '\u2014' }
    ], strengths, 'location_quotient', 'desc');

    // Growth Opportunities
    const growth = enriched.filter(r => r.industry_comparative_advantage === 0 && r.industry_feasibility_percentile_score >= 75)
      .sort((a, b) => (b.industry_feasibility || 0) - (a.industry_feasibility || 0));
    const h2 = document.createElement('div'); h2.className = 'sec-title'; h2.textContent = 'Growth Opportunities (' + growth.length + ')'; out.appendChild(h2);
    const t2 = document.createElement('div'); out.appendChild(t2);
    makeTable(t2, [
      { key: 'industry_description', label: 'Industry' },
      { key: 'industry_code', label: 'Code', align: 'center' },
      { key: 'industry_feasibility', label: 'Feasibility', align: 'right', fmt: v => fmt(v, 4) },
      { key: 'industry_feasibility_percentile_score', label: 'Feas. Pctl', align: 'right', fmt: v => fmt(v, 1) },
      { key: 'strategic_gain', label: 'Strategic Gain', align: 'right', fmt: v => fmt(v, 4) }
    ], growth, 'industry_feasibility', 'desc');

    // Scatter: Feasibility vs Strategic Gain
    const withFeas = enriched.filter(r => r.industry_feasibility != null && r.strategic_gain != null);
    if (withFeas.length > 0) {
      const st = document.createElement('div'); st.className = 'sec-title'; st.textContent = 'Feasibility vs Strategic Gain'; out.appendChild(st);
      const cw = document.createElement('div'); cw.className = 'chart-wrap';
      const ce = document.createElement('div'); cw.appendChild(ce); out.appendChild(cw);

      const rca = withFeas.filter(r => r.industry_comparative_advantage === 1);
      const noRca = withFeas.filter(r => r.industry_comparative_advantage !== 1);
      Plotly.newPlot(ce, [
        { x: noRca.map(r => r.industry_feasibility), y: noRca.map(r => r.strategic_gain),
          text: noRca.map(r => r.industry_description), mode: 'markers', type: 'scatter',
          name: 'No CA', marker: { color: '#a6cee3', size: 5, opacity: .5 }, hoverinfo: 'text' },
        { x: rca.map(r => r.industry_feasibility), y: rca.map(r => r.strategic_gain),
          text: rca.map(r => r.industry_description), mode: 'markers', type: 'scatter',
          name: 'Comp. Advantage', marker: { color: '#1f78b4', size: 7, opacity: .7 }, hoverinfo: 'text' }
      ], {
        xaxis: { title: 'Industry Feasibility' }, yaxis: { title: 'Strategic Gain' },
        margin: { t: 20, r: 20, b: 50, l: 60 }, height: 400,
        legend: { x: 0, y: 1 },
        font: { family: 'Source Sans Pro, sans-serif' }
      }, { responsive: true });
    }

  } catch (e) {
    console.error(e);
    out.innerHTML = '<div class="empty"><h2>Error</h2><p>' + escHtml(e.message) + '</p></div>';
  }
  unspin();
}

// ═══════════════════════════════════════
//  INDUSTRY SPACE
// ═══════════════════════════════════════
let isGeoWidget = null;

function initISControls() {
  function populate() {
    const level = document.getElementById('is-level').value;
    isGeoWidget = searchSelect(
      document.getElementById('is-geo-search'),
      geoItems(level),
      'Highlight a ' + LEVEL_NAME[level] + '...'
    );
  }
  populate();
  document.getElementById('is-level').addEventListener('change', populate);
  document.getElementById('is-go').addEventListener('click', loadIndustrySpace);
}

async function loadIndustrySpace() {
  spin('Loading industry data...');
  const out = document.getElementById('is-content');
  try {
    const level = document.getElementById('is-level').value;
    const levelCode = LEVELS[level];

    if (!metaIndustry) metaIndustry = await fetchCSV('meta/industry_specific.csv');
    const nodes = metaIndustry.filter(r => r.geo_aggregation_level === levelCode);

    // Optional geo highlight
    let rcaSet = null;
    const highlightGeo = isGeoWidget ? isGeoWidget.val() : null;
    if (highlightGeo) {
      try {
        const geoData = await fetchGz('by_geography/' + level + '/' + padGeoid(highlightGeo, level) + '.csv.gz');
        rcaSet = new Set(geoData.filter(r => r.industry_comparative_advantage === 1).map(r => String(r.industry_code)));
      } catch (e) { console.warn('Highlight geo failed:', e); }
    }

    out.innerHTML = '';

    const geoLabel = highlightGeo ? ' \u2014 ' + (level === 'county' ? countyName(padGeoid(highlightGeo, level)) : (metaGeo.find(g => g.geo_aggregation_level === levelCode && String(g.geoid) === highlightGeo) || {}).name || highlightGeo) : '';

    // Title
    const title = document.createElement('h2');
    title.style.cssText = 'color:var(--blue);margin-bottom:16px;';
    title.textContent = 'Industry Space' + geoLabel;
    out.appendChild(title);

    // Stats
    const cd = document.createElement('div');
    cd.className = 'cards';
    cd.innerHTML =
      '<div class="card"><div class="card-label">Industries</div><div class="card-value">' + fmtInt(nodes.length) + '</div></div>' +
      (rcaSet ? '<div class="card"><div class="card-label">Comparative Advantage</div><div class="card-value">' + fmtInt(rcaSet.size) + '</div></div>' : '');
    out.appendChild(cd);

    // Complexity scatter: complexity vs ubiquity
    const complexities = nodes.filter(n => n.industry_complexity != null);
    if (complexities.length > 0) {
      const st = document.createElement('div'); st.className = 'sec-title'; st.textContent = 'Industry Complexity vs Ubiquity'; out.appendChild(st);
      const cw = document.createElement('div'); cw.className = 'chart-wrap';
      const ce = document.createElement('div'); cw.appendChild(ce); out.appendChild(cw);

      if (rcaSet) {
        const rcaNodes = complexities.filter(n => rcaSet.has(String(n.industry_code)));
        const otherNodes = complexities.filter(n => !rcaSet.has(String(n.industry_code)));
        Plotly.newPlot(ce, [
          { x: otherNodes.map(n => n.industry_ubiquity), y: otherNodes.map(n => n.industry_complexity),
            text: otherNodes.map(n => (industryTitles.get(String(n.industry_code)) || n.industry_code)),
            mode: 'markers', type: 'scatter', name: 'Other',
            marker: { color: '#ccc', size: 5, opacity: .3 }, hoverinfo: 'text' },
          { x: rcaNodes.map(n => n.industry_ubiquity), y: rcaNodes.map(n => n.industry_complexity),
            text: rcaNodes.map(n => (industryTitles.get(String(n.industry_code)) || n.industry_code)),
            mode: 'markers', type: 'scatter', name: 'Comp. Advantage',
            marker: { color: '#1f78b4', size: 7, opacity: .8 }, hoverinfo: 'text' }
        ], {
          xaxis: { title: 'Ubiquity' }, yaxis: { title: 'Complexity' },
          margin: { t: 20, r: 20, b: 50, l: 60 }, height: 450,
          legend: { x: 0, y: 1 },
          font: { family: 'Source Sans Pro, sans-serif' }
        }, { responsive: true });
      } else {
        Plotly.newPlot(ce, [{
          x: complexities.map(n => n.industry_ubiquity),
          y: complexities.map(n => n.industry_complexity),
          text: complexities.map(n => (industryTitles.get(String(n.industry_code)) || n.industry_code)),
          mode: 'markers', type: 'scatter',
          marker: { color: complexities.map(n => n.industry_complexity), colorscale: 'Plasma', size: 6, colorbar: { title: 'ICI' } },
          hoverinfo: 'text'
        }], {
          xaxis: { title: 'Ubiquity' }, yaxis: { title: 'Complexity' },
          margin: { t: 20, r: 20, b: 50, l: 60 }, height: 450,
          font: { family: 'Source Sans Pro, sans-serif' }
        }, { responsive: true });
      }
    }

    // Complexity histogram
    const cvals = nodes.map(n => n.industry_complexity).filter(v => v != null);
    if (cvals.length > 1) {
      const ht = document.createElement('div'); ht.className = 'sec-title'; ht.textContent = 'Industry Complexity Distribution'; out.appendChild(ht);
      const hw = document.createElement('div'); hw.className = 'chart-wrap';
      const he = document.createElement('div'); hw.appendChild(he); out.appendChild(hw);
      Plotly.newPlot(he, [{ x: cvals, type: 'histogram', marker: { color: '#1f78b4' }, nbinsx: 40 }], {
        xaxis: { title: 'Industry Complexity' }, yaxis: { title: 'Count' },
        margin: { t: 20, r: 20, b: 50, l: 50 }, height: 300,
        font: { family: 'Source Sans Pro, sans-serif' }
      }, { responsive: true });
    }

    // Table
    const tt = document.createElement('div'); tt.className = 'sec-title'; tt.textContent = 'Industries'; out.appendChild(tt);
    const tw = document.createElement('div'); out.appendChild(tw);
    const tableRows = nodes.map(n => ({
      code: n.industry_code,
      name: industryTitles.get(String(n.industry_code)) || String(n.industry_code),
      complexity: n.industry_complexity,
      ubiquity: n.industry_ubiquity,
      rca: rcaSet ? (rcaSet.has(String(n.industry_code)) ? '\u2713' : '') : ''
    }));
    const cols = [
      { key: 'code', label: 'Code', align: 'center' },
      { key: 'name', label: 'Industry' },
      { key: 'complexity', label: 'Complexity', align: 'right', fmt: v => fmt(v) },
      { key: 'ubiquity', label: 'Ubiquity', align: 'right', fmt: v => fmtInt(v) }
    ];
    if (rcaSet) cols.push({ key: 'rca', label: 'CA', align: 'center' });
    makeTable(tw, cols, tableRows, 'complexity', 'desc');

  } catch (e) {
    console.error(e);
    out.innerHTML = '<div class="empty"><h2>Error</h2><p>' + escHtml(e.message) + '</p></div>';
  }
  unspin();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(async function init() {
  spin('Loading metadata...');
  try {
    await loadMeta();
    initNatControls();
    initRegControls();
    initISControls();
    // Auto-load national with default industry
    await loadNational();
  } catch (e) {
    console.error('Init failed:', e);
    document.getElementById('nat-content').innerHTML = '<div class="empty"><h2>Failed to Load</h2><p>' + escHtml(e.message) + '</p></div>';
  }
  unspin();
})();
</script>
